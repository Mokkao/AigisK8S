---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.24.8.50:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.24.8.50"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "aigis-k8s-01"
    ipAddress: "10.24.8.10"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/d3dc673627e9b94c6cd4122289aa52c2484cddb31017ae21b75309846e257d30
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:75:c4:d1"
        vlans:
          - vlanId: 8
            addresses:
              - "10.24.8.10/24"
            mtu: 1500
            routes:
              - gateway: "10.24.8.1"
                network: 0.0.0.0/0
            vip:
              ip: "10.24.8.50"
  - hostname: "aigis-k8s-02"
    ipAddress: "10.24.8.11"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/d3dc673627e9b94c6cd4122289aa52c2484cddb31017ae21b75309846e257d30
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:8e:62:69"
        vlans:
          - vlanId: 8
            addresses:
              - "10.24.8.11/24"
            mtu: 1500
            routes:
              - gateway: "10.24.8.1"
                network: 0.0.0.0/0
  - hostname: "aigis-k8s-03"
    ipAddress: "10.24.8.12"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/d3dc673627e9b94c6cd4122289aa52c2484cddb31017ae21b75309846e257d30
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:14:65:ee"
        vlans:
          - vlanId: 8
            addresses:
              - "10.24.8.12/24"
            mtu: 1500
            routes:
              - gateway: "10.24.8.1"
                network: 0.0.0.0/0

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

